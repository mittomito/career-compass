name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # package-lock.json が npm 11（Node 24 同梱）で生成されているため、
          # npm 10 系（Node 22）では npm ci が同期エラーで失敗する
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # build は tsc（型チェック）を含む
      - run: npm run build
